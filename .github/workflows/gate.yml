name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: write
jobs:
  gate:
    uses: zlxlabs/gate/.github/workflows/gate.yml@main
    with:
      tier: personal
      runner: self
      has_ui: false
      design_doc: ""
    secrets:
      FEISHU_CI_WEBHOOK: ${{ secrets.FEISHU_CI_WEBHOOK }}
